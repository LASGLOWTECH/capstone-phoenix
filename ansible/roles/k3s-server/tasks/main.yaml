- name: Download k3s install script
  get_url:
    url: https://get.k3s.io
    dest: /usr/local/bin/install-k3s.sh
    mode: '0755'

- name: Install k3s server
  shell: |
    /usr/local/bin/install-k3s.sh --write-kubeconfig-mode 644
  environment:
    INSTALL_K3S_VERSION: "{{ k3s_version }}"

- name: Wait for k3s service to be active
  systemd:
    name: k3s
    state: started
    enabled: true

- name: Fetch node token
  slurp:
    src: /var/lib/rancher/k3s/server/node-token
  register: k3s_token

- name: Set token fact
  set_fact:
    k3s_token_value: "{{ k3s_token.content | b64decode | trim }}"
