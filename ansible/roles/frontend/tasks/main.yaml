# install frontend packages
- name: install frontend packages
  apt:
    name: "{{ frontend_packages }}"
    state: present
  tags: [packages, frontend]  

- name: ensure web server is installed and running
  systemd:
    name: nginx
    state: started
    enabled: yes
  tags: [services,frontend]

  # Add nodesource repository for Node.js
- name: Add NodeSource repository for Node.js
  shell: |
    curl -fsSL https://deb.nodesource.com/setup_18.x | bash -
  args:
    executable: /bin/bash
  tags: [nodejs, frontend]

 
# Install Node.js and npm
- name: Install Node.js and npm
  apt:
    name: nodejs
    state: present
  tags: [nodejs, frontend]



  # create appliation home directory
- name: Create application home directory
  file:
    path: "/home/{{ app_user }}"
    state: directory
    owner: "{{ app_user }}"
    group: "{{ app_group }}"
    mode: '0755'
  tags: [directories,frontend]

# create the npm cache directory for the application and set permission
- name: Create npm cache directory
  file:
    path: "/home/{{ app_user }}/.npm"
    state: directory
    owner: "{{ app_user }}"
    group: "{{ app_group }}"
    mode: '0755'
  tags: [directories,frontend]

  # clone the  frontend application repository
- name: clone frontend application repository
  git: 
    repo: "{{ frontend_repo_url }}"
    dest: "{{ frontend_source_dir }}"
    version: "{{ frontend_branch }}"
    force: yes
  become_user: "{{ app_user }}"
  become: true
  tags: [git,deploy,frontend]

# create .env.production for the frontend
- name: create .env.production for the frontend
  copy:
    dest: "{{ frontend_source_dir }}/.env.production"
    content: |
      VITE_API_URL=/api
    owner: "{{ app_user }}"
    group: "{{ app_group }}"
    mode: '0644'
  tags: [configuration,frontend]


  # install npm dependencies
- name: Install frontend  dependencies
  command: npm ci
  args:
    chdir: "{{ frontend_source_dir }}"
  environment:
    npm_config_cache: "/home/{{ app_user }}/.npm"
  become: true
  become_user: "{{ app_user }}"
  tags: [npm, frontend]

- name: Build frontend application
  command: npm run build
  args:
    chdir: "{{ frontend_source_dir }}"
  become: true
  become_user: "{{ app_user }}"
  tags: [build, frontend]

 
# Ensure the Nginx root directory exists
- name: Ensure Nginx root directory exists
  file:
    path: "{{ frontend_nginx_root }}"
    state: directory
    owner: www-data
    group: www-data
    mode: '0755'
  tags: [directories, frontend]
 
# Clean previous build artifacts from the Nginx root directory
- name: Clean previous frontend build artifacts from Nginx root directory
  file:
    path: "{{ frontend_nginx_root }}"
    state: absent
  notify: Restart nginx
  tags: [nginx, deploy, frontend] 
   
# Recreate the Nginx root directory after cleaning
- name: Recreate the Nginx root directory after cleaning
  file:
    path: "{{ frontend_nginx_root }}"
    state: directory
    owner: www-data
    group: www-data
    mode: '0755'
  notify: Restart nginx
  tags: [nginx, deploy, frontend]
 
# Ensure nginx directories have correct permissions
- name: Ensure nginx directories have correct permissions
  file:
    path: "{{ frontend_nginx_root }}"
    state: directory
    mode: '0755'
    recurse: yes
  notify: Restart nginx
  tags: [nginx, permissions, frontend]
 
# Ensure files are readable by nginx
- name: Ensure frontend build files are readable by nginx
  command: find {{ frontend_build_dir }} -type f -exec chmod 644 {} \;
  changed_when: false
  notify: Restart nginx
  tags: [nginx, permissions, frontend]

- name: Copy frontend build to Nginx root
  copy:
    src: "{{ frontend_build_dir }}/"
    dest: "{{ frontend_nginx_root }}/"
    owner: www-data
    group: www-data
    mode: preserve
    remote_src: true
  notify: Restart nginx
  tags: [deploy, frontend]

# Create nginx configuration for the frontend application
- name: Install nginx configuration for frontend application
  template:
    src: taskapp-nginx.conf.j2
    dest: /etc/nginx/sites-available/taskapp
    owner: root
    group: root
    mode: '0644'
  notify: Restart nginx
  tags: [nginx, configuration, frontend]


# Remove default nginx configuration
- name: Remove default nginx configuration
  file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  notify: Restart nginx
  tags: [nginx, configuration, frontend]
 
# Enable nginx configuration for frontend application
- name: Enable nginx configuration for frontend application
  file:
    src: /etc/nginx/sites-available/taskapp
    dest: /etc/nginx/sites-enabled/taskapp
    force: yes
  notify: Restart nginx
  tags: [nginx, configuration, frontend]
 
# Validate nginx configuration
- name: Validate nginx configuration
  command: nginx -t
  changed_when: false
  notify: Restart nginx
  tags: [nginx, configuration, frontend]
 




