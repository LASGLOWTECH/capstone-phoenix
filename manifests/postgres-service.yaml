# Headless Service — required for StatefulSet stable network identity
# (postgres-0.postgres-headless.taskapp.svc.cluster.local).
apiVersion: v1
kind: Service
metadata:
  name: postgres-headless
  namespace: taskapp
  labels:
    app: postgres
spec:
  clusterIP: None
  selector:
    app: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
