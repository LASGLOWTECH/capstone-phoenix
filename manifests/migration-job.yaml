
apiVersion: batch/v1
kind: Job
metadata:
  name: taskapp-migrate
  namespace: taskapp
  labels:
    app: taskapp-backend
    role: migration
spec:
  backoffLimit: 2
  activeDeadlineSeconds: 180
  ttlSecondsAfterFinished: 300   # auto-cleans the completed Job Pod after 5 min
  template:
    metadata:
      labels:
        app: taskapp-backend
        role: migration
    spec:
      restartPolicy: Never
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: migrate
          image: ghcr.io/lasglowtech/taskapp-backend:v1.0.0   
          imagePullPolicy: IfNotPresent
          command: ["alembic", "upgrade", "head"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          envFrom:
            - secretRef:
                name: taskapp-backend-secret
            - configMapRef:
                name: taskapp-backend-config
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
