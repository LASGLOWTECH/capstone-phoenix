# Requires metrics-server (bundled with k3s by default — confirm with
# `kubectl get deployment metrics-server -n kube-system`).
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: taskapp-backend
  namespace: taskapp
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: taskapp-backend
  minReplicas: 2
  maxReplicas: 5
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 120   # avoid flapping on brief traffic dips
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
