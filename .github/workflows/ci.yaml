name: ci

on:
  pull_request:
    paths:
      - 'docker/**'
      - 'manifests/**'
      - '.github/workflows/**'

env:
  BACKEND_REPOSITORY: LASGLOWTECH/taskapp-backend
  FRONTEND_REPOSITORY: LASGLOWTECH/taskapp-frontend

jobs:
  build-image-checks:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    strategy:
      matrix:
        include:
          - name: backend
            context: taskapp-backend
            dockerfile: infrastructure/docker/backend/Dockerfile
          - name: frontend
            context: taskapp-frontend
            dockerfile: infrastructure/docker/frontend/Dockerfile

    steps:
      - name: Checkout infrastructure repository
        uses: actions/checkout@v4
        with:
          path: infrastructure

      - name: Checkout backend application
        uses: actions/checkout@v4
        with:
          repository: ${{ env.BACKEND_REPOSITORY }}
          ref: main
          path: taskapp-backend

      - name: Checkout frontend application
        uses: actions/checkout@v4
        with:
          repository: ${{ env.FRONTEND_REPOSITORY }}
          ref: main
          path: taskapp-frontend

      - name: Configure frontend build context
        run: |
          echo "VITE_API_URL=/api" > taskapp-frontend/.env.production
          cp infrastructure/docker/frontend/default.conf taskapp-frontend/default.conf

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.name }} image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: false
          tags: |
            taskapp-${{ matrix.name }}:ci
          build-args: |
            VITE_API_URL=/api
