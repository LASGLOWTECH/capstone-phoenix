name: cd

on:
  workflow_dispatch:
  workflow_run:
    workflows: [Build and Deploy TaskApp Images]
    types: [completed]
    branches: [main]

jobs:
  observe-gitops-bump:
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Report deployment ownership
        run: |
          echo "Image build, push, and GitOps manifest bump are handled by the Build and Deploy TaskApp Images workflow."
