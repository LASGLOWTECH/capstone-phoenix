name: Build and Deploy TaskApp Images

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy-taskapp-images.yml"
      - "docker/**"
      - "manifests/**"

permissions:
  contents: write
  packages: write

concurrency:
  group: taskapp-image-deploy
  cancel-in-progress: false

env:
  BACKEND_REPOSITORY: LASGLOWTECH/taskapp-backend
  FRONTEND_REPOSITORY: LASGLOWTECH/taskapp-frontend
  BACKEND_IMAGE: ghcr.io/lasglowtech/taskapp-backend
  FRONTEND_IMAGE: ghcr.io/lasglowtech/taskapp-frontend

jobs:
  build-push-and-bump:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'

    steps:
      - name: Checkout infrastructure repository
        uses: actions/checkout@v4
        with:
          path: infrastructure
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout backend application
        uses: actions/checkout@v4
        with:
          repository: ${{ env.BACKEND_REPOSITORY }}
          ref: main
          path: taskapp-backend

      - name: Checkout frontend application
        uses: actions/checkout@v4
        with:
          repository: ${{ env.FRONTEND_REPOSITORY }}
          ref: main
          path: taskapp-frontend

      - name: Set image tag
        id: image
        run: echo "tag=${GITHUB_SHA}" >> "${GITHUB_OUTPUT}"

      - name: Configure frontend production API path
        working-directory: taskapp-frontend
        run: echo "VITE_API_URL=/api" > .env.production

      - name: Stage frontend nginx config
        run: cp infrastructure/docker/frontend/default.conf taskapp-frontend/default.conf

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: taskapp-backend
          file: infrastructure/docker/backend/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ steps.image.outputs.tag }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: taskapp-frontend
          file: infrastructure/docker/frontend/Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ steps.image.outputs.tag }}
          build-args: |
            VITE_API_URL=/api

      - name: Install kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Bump Kubernetes image tags
        working-directory: infrastructure/manifests
        run: |
          kustomize edit set image "${BACKEND_IMAGE}=${BACKEND_IMAGE}:${IMAGE_TAG}"
          kustomize edit set image "${FRONTEND_IMAGE}=${FRONTEND_IMAGE}:${IMAGE_TAG}"
        env:
          IMAGE_TAG: ${{ steps.image.outputs.tag }}

      - name: Commit manifest image bump
        working-directory: infrastructure
        run: |
          if git diff --quiet manifests/kustomization.yaml; then
            echo "Kustomization already points at ${IMAGE_TAG}"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add manifests/kustomization.yaml
          git commit -m "Deploy TaskApp images ${IMAGE_TAG}"
          git push
        env:
          IMAGE_TAG: ${{ steps.image.outputs.tag }}
