# tasks file for roles/backend
- name: Create application group
  group:
    name: "{{ app_group }}"
    system: yes
    state: present

- name: Create application user
  user:
    name: "{{ app_user }}"
    group: "{{ app_group }}"
    system: yes
    shell: /bin/bash
    home: "/home/{{ app_user }}"
    create_home: yes

- name: Install backend runtime
  apt:
    name: "{{ backend_runtime_packages }}"
    state: present

- name: Create backend application directory
  file:
    path: "{{ backend_app_dir }}"
    state: directory
    owner: "{{ app_user }}"
    group: "{{ app_group }}"
    mode: "0755"

- name: Clone backend repository
  git:
    repo: "{{ backend_repo_url }}"
    dest: "{{ backend_app_dir }}"
    version: "{{ backend_branch }}"
    force: yes
  become_user: "{{ app_user }}"

- name: Create Python virtual environment
  command: python3 -m venv {{ backend_venv_dir }}
  args:
    creates: "{{ backend_venv_dir }}/bin/activate"
  become_user: "{{ app_user }}"

- name: Create backend environment file
  copy:
    dest: "{{ backend_app_dir }}/.env"
    owner: "{{ app_user }}"
    group: "{{ app_group }}"
    mode: "0600"
    content: |
      DATABASE_HOST=localhost
      DATABASE_PORT=5432
      DATABASE_NAME={{ db_name }}
      DATABASE_USER={{ db_user }}
      DATABASE_PASSWORD={{ db_password }}
      FLASK_ENV=production
      FLASK_DEBUG=0
      SECRET_KEY=hioJTg56FGDYGujoudnGT+k1shb!!

- name: Install backend Python requirements
  pip:
    requirements: "{{ backend_app_dir }}/requirements.txt"
    virtualenv: "{{ backend_venv_dir }}"
    virtualenv_python: python3
  become_user: "{{ app_user }}"
  ignore_errors: yes

- name: Create Docker image for backend
  command: docker build -t taskapp-backend:latest .
  args:
    chdir: "{{ backend_app_dir }}"
  become: true
  when: false  # Disabled for now, will use k3s deployment instead

- name: Install backend systemd unit
  template:
    src: taskapp-backend.service.j2
    dest: /etc/systemd/system/taskapp-backend.service
    mode: "0644"
  when: false  # Disabled for now, will use k3s deployment instead

- name: Reload systemd
  systemd:
    daemon_reload: true
  when: false  # Disabled for now, will use k3s deployment instead

- name: Enable and start backend service
  systemd:
    name: taskapp-backend
    enabled: true
    state: started
  when: false  # Disabled for now, will use k3s deployment instead
