# tasks file for roles/frontend
- name: Create application group
  group:
    name: "{{ app_group }}"
    system: yes
    state: present

- name: Create application user
  user:
    name: "{{ app_user }}"
    group: "{{ app_group }}"
    system: yes
    shell: /bin/bash
    home: "/home/{{ app_user }}"
    create_home: yes

- name: Install frontend packages
  apt:
    name: "{{ frontend_packages }}"
    state: present

- name: Ensure web server is installed and running
  systemd:
    name: nginx
    state: started
    enabled: yes

- name: Add NodeSource repository for Node.js
  shell: |
    curl -fsSL https://deb.nodesource.com/setup_18.x | bash -
  args:
    executable: /bin/bash

- name: Install Node.js and npm
  apt:
    name: nodejs
    state: present

- name: Create application home directory
  file:
    path: "/home/{{ app_user }}"
    state: directory
    owner: "{{ app_user }}"
    group: "{{ app_group }}"
    mode: '0755'

- name: Create npm cache directory
  file:
    path: "/home/{{ app_user }}/.npm"
    state: directory
    owner: "{{ app_user }}"
    group: "{{ app_group }}"
    mode: '0755'

- name: Clone frontend application repository
  git:
    repo: "{{ frontend_repo_url }}"
    dest: "{{ frontend_source_dir }}"
    version: "{{ frontend_branch }}"
    force: yes
  become_user: "{{ app_user }}"

- name: Create .env.production for the frontend
  copy:
    dest: "{{ frontend_source_dir }}/.env.production"
    content: |
      VITE_API_URL=/api
    owner: "{{ app_user }}"
    group: "{{ app_group }}"
    mode: '0644'

- name: Install frontend dependencies
  command: npm ci
  args:
    chdir: "{{ frontend_source_dir }}"
  environment:
    npm_config_cache: "/home/{{ app_user }}/.npm"
  become_user: "{{ app_user }}"

- name: Build frontend application
  command: npm run build
  args:
    chdir: "{{ frontend_source_dir }}"
  become_user: "{{ app_user }}"

- name: Ensure the Nginx root directory exists
  file:
    path: "{{ frontend_nginx_root }}"
    state: directory
    owner: www-data
    group: www-data
    mode: '0755'

- name: Clean previous build artifacts from the Nginx root directory
  file:
    path: "{{ frontend_nginx_root }}"
    state: absent
  notify: Restart nginx

- name: Recreate the Nginx root directory after cleaning
  file:
    path: "{{ frontend_nginx_root }}"
    state: directory
    owner: www-data
    group: www-data
    mode: '0755'
  notify: Restart nginx

- name: Ensure nginx directories have correct permissions
  file:
    path: "{{ frontend_nginx_root }}"
    state: directory
    mode: '0755'
    recurse: yes
  notify: Restart nginx

- name: Ensure frontend build files are readable by nginx
  command: find {{ frontend_build_dir }} -type f -exec chmod 644 {} \;
  changed_when: false
  notify: Restart nginx

- name: Copy frontend build to Nginx root
  copy:
    src: "{{ frontend_build_dir }}/"
    dest: "{{ frontend_nginx_root }}/"
    owner: www-data
    group: www-data
    mode: preserve
    remote_src: true
  notify: Restart nginx

- name: Install nginx configuration for frontend application
  template:
    src: taskapp-nginx.conf.j2
    dest: /etc/nginx/sites-available/taskapp
    owner: root
    group: root
    mode: '0644'
  notify: Restart nginx

- name: Remove default nginx configuration
  file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  notify: Restart nginx

- name: Enable nginx configuration for frontend application
  file:
    src: /etc/nginx/sites-available/taskapp
    dest: /etc/nginx/sites-enabled/taskapp
    force: yes
  notify: Restart nginx

- name: Validate nginx configuration
  command: nginx -t
  changed_when: false
  notify: Restart nginx
